name: Navsys Coord UBSan

on:
  pull_request:
    paths:
      - ".github/workflows/navsys-coord-ubsan.yml"
      - "byul/CMakeLists.txt"
      - "byul/CMakePresets.json"
      - "byul/cmake/**"
      - "byul/navsys/coord/**"
      - "byul/navsys/tests/**"
      - "byul/tests/**"
      - "docs/ko/todo/navsys/coord-hash-abi-policy.json"
      - "docs/ko/todo/navsys/todo-navsys-coord-coord-hash.org"
      - "docs/ko/todo/navsys/todo-navsys-coord-coord.org"
      - "tools/header_abi_audit.py"
      - "tools/header_refactor_build_snapshot.py"
      - "tools/python/byul_wrapper/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-ubsan:
    name: Linux UBSan (coord static/root)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out vendored source dependencies
        run: |
          git submodule update --init --depth 1 external/SDL3-3.2.18/source
          git submodule update --init --depth 1 external/eigen-3.4.0
          git submodule update --init --depth 1 external/doctest-2.4.12
          git submodule update --init --depth 1 external/glad-2.0.8

      - name: Configure Linux Debug with UBSan
        working-directory: byul
        env:
          CFLAGS: >-
            -fsanitize=undefined
            -fno-sanitize-recover=undefined
            -fno-omit-frame-pointer
          CXXFLAGS: >-
            -fsanitize=undefined
            -fno-sanitize-recover=undefined
            -fno-omit-frame-pointer
          LDFLAGS: >-
            -fsanitize=undefined
            -fno-sanitize-recover=undefined
        run: >-
          cmake --preset linux-debug
          -DSDL_UNIX_CONSOLE_BUILD=ON

      - name: Build coord module and root shared tests
        working-directory: byul
        run: >-
          cmake --build --preset build-linux-debug
          --target test_coord byul test_byul
          test_navsys_allocation_failure

      - name: Verify the complete coord inventory in static and root targets
        shell: python
        run: |
          import json
          from pathlib import Path

          manifest = json.loads(
              Path(
                  "docs/ko/todo/navsys/coord-hash-abi-policy.json"
              ).read_text(encoding="utf-8")
          )
          inventory = manifest["build_inventory"]
          expected = set(inventory["sources"])
          definitions = {
              "module": f'-D{inventory["module_compile_definition"]}',
              "root": f'-D{inventory["root_compile_definition"]}',
          }
          commands = json.loads(
              Path("build_debug/compile_commands.json").read_text(
                  encoding="utf-8"
              )
          )
          observed = {target: set() for target in definitions}
          uninstrumented = []
          for entry in commands:
              source = Path(entry["file"]).resolve().as_posix()
              matched = next(
                  (
                      approved
                      for approved in expected
                      if source.endswith(approved)
                  ),
                  None,
              )
              if matched is None:
                  continue
              command = entry["command"]
              for target, definition in definitions.items():
                  if definition not in command:
                      continue
                  observed[target].add(matched)
                  if "-fsanitize=undefined" not in command:
                      uninstrumented.append((target, matched))

          for target, sources in observed.items():
              missing = sorted(expected - sources)
              if missing:
                  raise SystemExit(
                      f"{target} coord inventory is incomplete: {missing}"
                  )
          if uninstrumented:
              raise SystemExit(
                  "coord compile commands are missing UBSan: "
                  f"{uninstrumented}"
              )
          print(
              "verified coord inventory:",
              {target: len(sources) for target, sources in observed.items()},
          )

      - name: Stage the root shared SDK component
        run: >-
          cmake --install build_debug
          --component byul_sdk
          --prefix build_coord_sdk

      - name: Audit live headers, exports and wrapper intersection
        run: |
          python tools/header_refactor_build_snapshot.py \
            --apply \
            --nm "$(command -v nm)" \
            --dll build_coord_sdk/lib/libbyul.so \
            --install-root build_coord_sdk \
            --profile linux-x64-gcc-debug-coord-gate \
            --output build_coord_gate/live-build.json
          python tools/header_abi_audit.py \
            --build-snapshot build_coord_gate/live-build.json \
            --c-compiler "$(command -v cc)" \
            --cxx-compiler "$(command -v c++)" \
            --compile-output-dir build_coord_gate/standalone \
            --compile-report build_coord_gate/standalone.json \
            --json-output build_coord_gate/header-abi.json

      - name: Build and run clean C17 and C++17 SDK consumers
        run: |
          cmake \
            -S byul/tests/sdk_consumer \
            -B build_coord_sdk_consumer \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBYUL_SDK_ROOT="${PWD}/build_coord_sdk"
          cmake --build build_coord_sdk_consumer --parallel
          export LD_PRELOAD="$(cc -print-file-name=libasan.so)"
          ./build_coord_sdk_consumer/byul_sdk_consumer
          ./build_coord_sdk_consumer/byul_sdk_consumer_cpp

      - name: Run coord static and root shared UBSan gates
        run: >-
          ctest --test-dir build_debug
          --output-on-failure
          -R "^(test_coord|test_byul|test_navsys_allocation_failure|test_navsys_allocation_leak_gate)$"
